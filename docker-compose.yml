services:
  backend:
    build:
      context: ./backend
    environment:
      SKILL_ARENA_HTTP_ADDR: ":8080"
      SKILL_ARENA_DATABASE_URL: /data
      SKILL_ARENA_JWT_SECRET: local-development-change-me
      SKILL_ARENA_EMAIL_OUTBOX_ONLY: "true"
    ports:
      - "8080:8080"
    volumes:
      - backend-data:/data

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  backend-data:
